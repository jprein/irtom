<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./favicon-32x32.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="./favicon-16x16.png"
		/>
		<link rel="icon" href="./favicon.ico" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="./apple-touch-icon-180x180.png"
		/>
		<link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5" />
		<title>irToM</title>
	</head>
	<body>
		<div id="root">
			<div id="audio-start-overlay">
				<button id="audio-start-button" type="button">Klicke hier, um mit der Studie zu beginnen</button>
			</div>
			<video id="fsplayer" autoplay playsinline></video>
			<audio id="audio" autoplay></audio>
			<div id="wrapper"></div>
			<script type="module" src="./app.ts"></script>
		</div>
		<div
			id="webcam-modal"
			class="camera-modal hidden"
			role="dialog"
			aria-modal="true"
			aria-labelledby="webcam-modal-title"
		>
			<div class="camera-modal__card">
				<div class="camera-modal__header">
					<h2 id="webcam-modal-title">Webcam Preview</h2>
					<button
						id="webcam-modal-close"
						type="button"
						class="camera-modal__close"
						aria-label="Close webcam preview"
					>
						×
					</button>
				</div>
				<video id="webcam-modal-video" autoplay playsinline muted></video>
			</div>
		</div>
	</body>
</html>
