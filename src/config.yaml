---
devmode: # exposes global variables, and does other stuff
  on: false
  playbackRate: 1
htmlBg: white # background color for letter boxing edges if aspect ratio is not 16:9
svgBg: white
hideUrlParameters: false
slideTransition:
  override: true # force slide transitions
  fadeOut: 0.25
  fadeIn: 0.25
css:
  # will be used within the init process to to add style="cursor: pointer" to the given ids
  # this uses querySelectorAll in styleDefaults.ts
  # Syntax: [id^=startsWith][id$=endsWith]
  mousePointerObjects:
    [
      '#link-s-introduction-speaker',
      '[id^=link][id$=next]',
      '[id^=link][id$=repeat]',
      '#s-yesnochoice-yellow-yes',
      '#s-yesnochoice-blue-yes',
      '#s-yesnochoice-purple-yes',
      '#s-yesnochoice-yellow-no',
      '#s-yesnochoice-blue-no',
      '#s-yesnochoice-purple-no',
      '#s-yesnotraining-a-yellow-yes',
      '#s-yesnotraining-a-blue-yes',
      '#s-yesnotraining-a-purple-yes',
      '#s-yesnotraining-a-yellow-no',
      '#s-yesnotraining-a-blue-no',
      '#s-yesnotraining-a-purple-no',
      '[id$=-left]',
      '[id$=-center]',
      '[id$=-right]',
    ]
  # will be used within the init process to to add a zoom animation on hover
  scaleOnHoverObjects:
    [
      '#link-s-introduction-speaker',
      '[id^=link][id$=next]',
      '[id^=link][id$=repeat]',
      '#s-yesnochoice-yellow-yes',
      '#s-yesnochoice-blue-yes',
      '#s-yesnochoice-purple-yes',
      '#s-yesnochoice-yellow-no',
      '#s-yesnochoice-blue-no',
      '#s-yesnochoice-purple-no',
      '#s-yesnotraining-a-yellow-yes',
      '#s-yesnotraining-a-blue-yes',
      '#s-yesnotraining-a-purple-yes',
      '#s-yesnotraining-a-yellow-no',
      '#s-yesnotraining-a-blue-no',
      '#s-yesnotraining-a-purple-no',
      '[id$=-left]',
      '[id$=-center]',
      '[id$=-right]',
    ]

globals:
  defaultSubjectId: demo
  defaultCommunity: german
  defaultDataTransfer: local
  slideGapDuration: 500 # delay for most slides before transitioning to next

procedure:
  # use exact slide ids from Illustrator for values
  # The order defines the experiment order
  # If you create a key with a sub array everything in the sub array will be randomized
  # You can nest only two levels deep
  german:
    - s-introduction
    # - s-emojichoice
    # - s-yesnotraining-a
    # - s-yesnotraining-b
    # - s-yesnotraining-c
    # - s-yesnotraining-d
    # - s-yesnotraining-e
    # - s-leftrighttraining-a
    # - s-leftrighttraining-b
    # - s-leftrighttraining-c
    # - s-leftrighttraining-d
    # - s-namestraining
    # - s-perspectivetaking-one-a
    # - s-pretense-a
    # - s-diversedesires-a
    # - s-perspectivetaking-one-b
    # - s-pretense-b
    # - s-knowledgeaccess-b
    # - s-perspectivetaking-one-c
    # - s-perspectivetaking-one-d
    # - s-dogtraining
    # - s-knowledgeaccess-c
    # - s-falsebelief-uc-a
    # - s-diversedesires-c
    # - s-diversedesires-d
    # - s-appearancereality-a
    # - s-parentstraining
    # - s-knowledgeaccess-d
    # - s-falsebelief-uc-b
    # - s-diversebeliefs-a
    # - s-diversebeliefs-b
    # - s-diversebeliefs-c
